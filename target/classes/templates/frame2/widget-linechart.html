.ct-label {

    <script type="text/javascript" th:inline="javascript">
        /*<![CDATA[*/
        var widget_title = [[${widget_title}]];
        var option_data_name = [[${option_data_name}]];
        var option_data_option = [[${option_data_option}]];
        var widget_polling_interval = [[${widget_polling_interval}]];
        var NodataMSG = [[#{NodataMSG}]];
        /*]]>*/
    </script>
    <script type="text/javascript">
        /*<![CDATA[*/

        $(document).ready(function() {
            function clearChart() {
                if (chart)
                    chart.detach();
                $("#ct-chart").empty();
                series = [];
            }
            getWidgetDataAPI(option_data_name, option_data_option, callbackAPIInit);
            setInterval(function() {
                clearChart();
                getWidgetDataAPI(option_data_name, option_data_option, callbackAPIInit);

            }, widget_polling_interval);

            function getWidgetDataAPI(arg, option, callbackfnc) {
                    $.ajax({
                        url: '/api/getWidgetDataAPI/' + arg + '?device_name=' + option,
                        dataType: 'text',
                        method: 'get',
                        success: function(data) {
                            callbackfnc(JSON.parse(data));
                        }
                    });
                }
                //getWidgetDataAPI("InterfaceTrafficInPeriod", callbackAPIInit);
            var series = [];
            var chart;
            function getReadableFileSizeString(fileSizeInBytes) {
                var i = -1;
                var byteUnits = [' K', ' M', ' G', ' T', 'P', 'E', 'Z', 'Y'];
                do {
                    fileSizeInBytes = fileSizeInBytes / 1024;
                    i++;
                } while (fileSizeInBytes > 1024);

                return Math.max(fileSizeInBytes, 0.1).toFixed(1) + byteUnits[i];
            }
            function callbackAPIInit(data) {
                var list = data.traffic;

                var map = new Object(); // or var map = {};
                var legends = [];
                for (var x in list) {
                    if (map[list[x].dispname] == undefined) {
                        map[list[x].dispname] = [];
                        series.push(map[list[x].dispname]);
                        legends.push(list[x].dispname);
                    }
                    map[list[x].dispname].push(list[x].g);
                }
                if (legends.length == 0) {
                    $("#ct-chart").css('display', 'none');
                    $(".box-body").css('padding-top', '0');
                    $(".box-body").empty();
                    $(".box-body").append('<div class="text-center" id="nodata"><p style="margin:50px 0;">' + NodataMSG + '</p></div>')
                } else {
                    $("#nodata").remove();
                    $(".box-body").css('padding-top', '30px');
                    $("#ct-chart").css('display', 'block');
                    chart = new Chartist.Line('#ct-chart', {
                            labels: [],
                            series: series
                        },
                        {
                            chartPadding: {
                              top: 0,
                              right: 0,
                              bottom: 0,
                              left: 0
                            },
                            //{
                                axisY: {
                                    labelInterpolationFnc: function(value) {
                                        //return (value / 1000 / 1000) + 'M';
                                        return getReadableFileSizeString(value);
                                    }
                                },
                                low: 0,
                                fullWidth: true,
                                showPoint: true,
                                showArea: true,
                            //},
					    plugins: [
					        /*Chartist.plugins.legend({
					            legendNames: legends,
					            position: 'top'
					        }),*/
                            Chartist.plugins.ctAxisTitle({
                                axisX: {
                                  axisTitle: "Last 24 Hrs",
                                  axisClass: "ct-axis-title",
                                  offset: {
                                    x: 0,
                                    y: 15
                                  },
                                  textAnchor: "middle"
                                }/*,
                                axisY: {
                                  axisTitle: "Traffic",
                                  axisClass: "ct-axis-title",
                                  offset: {
                                    x: 0,
                                    y: -1
                                  },
                                  flipTitle: false
                                }*/
                              })					        
					    ]
					});

                    if (chart.supportsAnimations) {
                        // Let's put a sequence number aside so we can use it in the event callbacks
                        var seq = 0,
                            delays = 20,
                            durations = 2000;

                        // Once the chart is fully created we reset the sequence
                        chart.on('created', function() {
                            seq = 0;
                        });

                        // On each drawn element by Chartist we use the Chartist.Svg API to trigger SMIL animations
                        chart.on('draw', function(data) {
                            seq++;

                            if (data.type === 'line') {
                                // If the drawn element is a line we do a simple opacity fade in. This could also be achieved using CSS3 animations.
                                data.element.animate({
                                    opacity: {
                                        // The delay when we like to start the animation
                                        begin: seq * delays + 1000,
                                        // Duration of the animation
                                        dur: durations,
                                        // The value where the animation should start
                                        from: 0,
                                        // The value where it should end
                                        to: 1
                                    }
                                });
                            } else if (data.type === 'label' && data.axis === 'x') {
                                data.element.animate({
                                    y: {
                                        begin: seq * delays,
                                        dur: durations,
                                        from: data.y + 100,
                                        to: data.y,
                                        // We can specify an easing function from Chartist.Svg.Easing
                                        easing: 'easeOutQuart'
                                    }
                                });
                            } else if (data.type === 'label' && data.axis === 'y') {
                                data.element.animate({
                                    x: {
                                        begin: seq * delays,
                                        dur: durations,
                                        from: data.x - 100,
                                        to: data.x,
                                        easing: 'easeOutQuart'
                                    }
                                });
                            } else if (data.type === 'point') {

                                seq++;

                                data.element.animate({
                                    x1: {
                                        from: data.x - 50,
                                        to: data.x,
                                        begin: seq * 50,
                                        dur: 500,
                                        easing: Chartist.Svg.Easing.easeOutQuint
                                    },
                                    opacity: {
                                        from: 0,
                                        to: 1,
                                        begin: seq * 50,
                                        dur: 300,
                                    }
                                });


                            } else if (data.type === 'point1') {
                                data.element.animate({
                                    x1: {
                                        begin: seq * delays,
                                        dur: durations,
                                        from: data.x - 10,
                                        to: data.x,
                                        easing: 'easeOutQuart'
                                    },
                                    x2: {
                                        begin: seq * delays,
                                        dur: durations,
                                        from: data.x - 10,
                                        to: data.x,
                                        easing: 'easeOutQuart'
                                    },
                                    opacity: {
                                        begin: seq * delays,
                                        dur: durations,
                                        from: 0,
                                        to: 1,
                                        easing: 'easeOutQuart'
                                    }
                                });
                            } else if (data.type === 'grid') {
                                // Using data.axis we get x or y which we can use to construct our animation definition objects
                                var pos1Animation = {
                                    begin: seq * delays,
                                    dur: durations,
                                    from: data[data.axis.units.pos + '1'] - 15,
                                    to: data[data.axis.units.pos + '1'],
                                    easing: 'easeOutQuart'
                                };

                                var pos2Animation = {
                                    begin: seq * delays,
                                    dur: durations,
                                    from: data[data.axis.units.pos + '2'] - 50,
                                    to: data[data.axis.units.pos + '2'],
                                    easing: 'easeOutQuart'
                                };

                                var animations = {};
                                animations[data.axis.units.pos + '1'] = pos1Animation;
                                animations[data.axis.units.pos + '2'] = pos2Animation;
                                animations['opacity'] = {
                                    begin: seq * delays,
                                    dur: durations,
                                    from: 0,
                                    to: 1,
                                    easing: 'easeOutQuart'
                                };

                                data.element.animate(animations);
                            }
                        });

                        // For the sake of the example we update the chart every time it's created with a delay of 10 seconds
                        chart.on('created', function() {
                            if (window.__exampleAnimateTimeout) {
                                clearTimeout(window.__exampleAnimateTimeout);
                                window.__exampleAnimateTimeout = null;
                            }
                            window.__exampleAnimateTimeout = setTimeout(chart.update.bind(chart), 20000);
                        });
                    } else {
                        //chart.options.showLabel = false;
                        //chart.update();

                    }

                }
            };
        });
        /*]]>*/
    </script>
</head>

    </div>
    <!-- /.box-header -->

        <div class="ct-golden-section" id="ct-chart"></div>
    </div>
