<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="layout/default6">

<head>
    <title>simpleEye MainPage</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Bootstrap 3.3.7 -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/bootstrap/dist/css/bootstrap.min.css" th:href="@{/modules/bootstrap/dist/css/bootstrap.min.css}" />
    <!-- Font Awesome -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/font-awesome/css/font-awesome.min.css" th:href="@{/modules/font-awesome/css/font-awesome.min.css}" />
    <!-- Ionicons -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/Ionicons/css/ionicons.min.css" th:href="@{/modules/Ionicons/css/ionicons.min.css}" />
    <!-- jvectormap -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/jvectormap/jquery-jvectormap.css" th:href="@{/modules/jvectormap/jquery-jvectormap.css}" />
    <!-- theme custom -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/system-white.css" th:href="@{/css/system-white.css}" />
    <!-- AdminLTE Skins. Choose a skin from the css/skins
       folder instead of downloading all of them to reduce the load. -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/skins/_all-skins.min.css" th:href="@{/css/skins/_all-skins.min.css}" />

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->


    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>
    <!-- AdminLTE App -->
    <script src="../../static/js/adminlte.min.js" th:src="@{/js/adminlte.min.js}"></script>
    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
    <!-- SlimScroll -->
    <script src="../../static/modules/jquery-slimscroll/jquery.slimscroll.min.js" th:src="@{/modules/jquery-slimscroll/jquery.slimscroll.min.js}"></script>
    <!-- ChartJS -->
    <script src="../../static/modules/Chart.js/Chart.js" th:src="@{/modules/Chart.js/Chart.js}"></script>
    <!-- AdminLTE dashboard demo (This is only for demo purposes) -->
    <script src="../../static/js/pages/dashboard2.js" th:src="@{/js/pages/dashboard2.js}"></script>
    <!-- DataTables -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/datatables.net-bs/css/dataTables.bootstrap.min.css" th:href="@{/modules/datatables.net-bs/css/dataTables.bootstrap.min.css}" />
    <script src="../../static/modules/datatables.net/js/jquery.dataTables.min.js" th:src="@{/modules/datatables.net/js/jquery.dataTables.min.js}"></script>
    <script src="../../static/modules/datatables.net-bs/js/dataTables.bootstrap.min.js" th:src="@{/modules/datatables.net-bs/js/dataTables.bootstrap.min.js}"></script>
    <style>
        body {
            padding-right: 0 !important
        }
        .modal-open {
            overflow: auto;
            padding-right: 0 !important;
        }
        td {
            vertical-align: middle !important;
        }
    </style>
</head>

<body>

    <div class="page-wrapper" layout:fragment="content">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <div class="panel-custom-wrap">
                <!-- Content Header (Page header) -->
                <section class="content-header">
                    <div class="icon-menu-borderline">
                        <h3 th:text="#{mainmodify}" class="title col-sm-6"></h3>
                        <ol class="breadcrumb no-margin-padding col-sm-6  text-right">
                            <li><a href="/setting2/system" th:href="@{/setting2/system.html}" th:text="#{systemopt}"><i class="fa fa-dashboard"></i></a>
                            </li>
                            <li><a href="/setting2/main" th:href="@{/setting2/main.html}" th:text="#{mainpage}">main-setting</a>
                            </li>
                            <li class="active" th:text="#{mainmodify}">main-modify</li>
                        </ol>
                    </div>
                </section>
                <!-- Main content -->
                <section class="content">
                    <div class="subpage-menu">
                        <div class="row">
                            <div class="col-md-12 ">
                                <div class="panel panel-default form-inline text-center">
                                    <div class="row">
                                        <div class="col-md-10">
                                            <form accept-charset="UTF-8" id="createLayout">
                                                <div class="form-group input-custom">
                                                    <label for="layout" th:text="#{layout}">layout:</label>
                                                    <input type="text" class="form-control" id="layout" name="layout" readonly="readonly">
                                                    </input>
                                                </div>
                                                <div class="form-group input-custom">
                                                    <label for="theme" th:text="#{theme}">theme:</label>
                                                    <input class="form-control" id="theme" name="theme" readonly="readonly">
                                                    </input>
                                                </div>
                                                <div class="form-group input-custom">
                                                    <label for="name" th:text="#{pagename}"></label>
                                                    <input type="text" id="name" class="form-control" name="name" th:attr="placeholder=#{pagename}" readonly="readonly" />
                                                    <label for="description" th:text="#{description}"></label>
                                                    <input type="text" id="description" class="form-control" name="description" th:attr="placeholder=#{description}" readonly="readonly" />
                                                    <!-- <input type="text" id="creator_id" val="1" name="creator_id" /> -->
                                                </div>

                                            </form>
                                        </div>
                                        <div class="col-md-2" style="margin:auto 0;text-align:left">
                                            <div class="form-group input-custom">
                                                <button class="btn btn-success-custom btn-md" th:text="#{authlist}" id="viewauthlist" data-target="#authlist" data-toggle="modal">리스트</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <script th:inline="javascript">
                            /*<![CDATA[*/

                            var mainpageid = [[${mainpageid}]];

                            console.log(mainpageid);

                            /*]]>*/
                        </script>

                        <script type="text/javascript">
                            /*<![CDATA[*/

                            function getAuthList(mainpageid) {

                                authList_datatables = null;
                                if (authList_datatables) authList_datatables.destroy();

                                authList_datatables = $('#authList').DataTable({
                                    sAjaxDataProp: "",
                                    paging: false,
                                    ordering: false,
                                    info: false,
                                    destroy: true,
                                    searching: false,
                                    columnDefs: [{
                                        visible: false,
                                        targets: [0, 1, 3, 4]
                                    }],
                                    ajax: {
                                        url: "/api/htbackend/getAuthList2?mainpageid=" + mainpageid,
                                        type: 'get'
                                    },
                                    columns: [{
                                            "data": "mainpage_id"
                                        }, {
                                            "data": "systemuser_id"
                                        }, {
                                            "data": "username"
                                        }, {
                                            "data": "fullname"
                                        }, {
                                            "data": "email"
                                        }, {
                                            "data": "date_joined",
                                            "defaultContent": ""
                                        }

                                    ]
                                });
                                $('#authList').css('margin', '0 auto');

                                $('#authList tbody').on('click', 'tr', function() {
                                    if ($(this).hasClass('selected')) {
                                        $(this).removeClass('selected');
                                    } else {

                                        authList_datatables.$('tr.selected').removeClass('selected');
                                        $(this).addClass('selected');

                                        var d = authList_datatables.row(this).data();

                                        $("#modalDelete").attr("data-user-id", d.systemuser_id);
                                        $("#modalDelete").attr("data-id", d.mainpage_id);
                                    }
                                });
                            };


                            $(document).on("click", "#MainNavHelp", function() {


                                $.ajax({
                                    url: '/api/htbackend/getAvailableSystemUser2?mainpageid=' + mainpageid,
                                    dataType: 'text',
                                    method: 'get',
                                    success: function success(r) {
                                        console.log(r);
                                        var rspns = eval(r);
                                        //fill country
                                        $("#systemuser_id option").remove(); // Remove all <option> child tags.
                                        $("#systemuser_id").append( // Append an object to the inside of the select box
                                            $("<option></option>") // Yes you can do this.
                                            .text('--- Select ---')
                                            .val('NONE')
                                        );
                                        $.each(rspns, function(index, item) { // Iterates through a collection
                                            $("#systemuser_id").append( // Append an object to the inside of the select box
                                                $("<option></option>") // Yes you can do this.
                                                .text(item.username)
                                                .val(item.systemuser_id)
                                            );
                                        });
                                    }
                                }); //ajax//

                            });

                            $(document).on("click", "#createBtn2", function() {
                                var url = "/api/htbackend/addAuthorizedSystemUser2?";

                                url += "mainpage_id=" + mainpageid;

                                if ($("#createForm #systemuser_id").val() !== 'NONE') {
                                    url += "&systemuser_id=" + $("#createForm #systemuser_id").val();
                                }

                                $.ajax({
                                    url: url,
                                    dataType: 'text',
                                    contentType: 'application/x-www-form-urlencoded',
                                    method: 'get',
                                    success: function success(r) {

                                        $("#myModal2").modal("hide");
                                        getAuthList(mainpageid);
                                    }
                                });
                            });


                            $(document).ready(function() {
                                $.ajax({
                                    url: '/api/htbackend/getMainPageLayoutByPageID/' + mainpageid,
                                    dataType: 'text',
                                    contentType: 'application/x-www-form-urlencoded',
                                    method: 'get',
                                    success: function(r) {

                                        var rspns = eval(r);
                                        console.log(r);
                                        $.each(rspns, function(index, item) { // Iterates through a collection
                                            $("#layout").val(item.layout);
                                            $("#theme").val(item.theme);
                                            $("#name").val(item.name);
                                            $("#description").val(item.description);
                                        });
                                    }
                                });
                                getAuthList(mainpageid);

                            });

                            $(document).on("click", "#createBtn", function() {
                                if ($("#createLayout #layout").val() == undefined || $("#createLayout #layout").val() === 'NONE') {
                                    alert("Please select Layout");
                                    return;
                                }
                                if ($("#createLayout #theme").val() == undefined || $("#createLayout #theme").val() === 'NONE') {
                                    alert("Please select Theme");
                                    return;
                                }
                                var x = document.getElementById("createLayout");
                                var createresult = $("#createLayout").serialize();
                                var layoutname = $("#createLayout #name").val();

                                var sitetreejson_data = 'test';
                                createresult += '&sitetreejson_data=' + sitetreejson_data;
                                console.log(createresult);
                                console.log(layoutname);
                                $.ajax({
                                    url: '/htbackend/createMainPageLayout',
                                    dataType: 'text',
                                    contentType: 'application/x-www-form-urlencoded',
                                    data: createresult,
                                    method: 'post',
                                    success: function success(r) {

                                        history.back(-1);
                                    }
                                });
                            }); /* 생성버튼 클릭시 ajax 방식으로 데이터 인서트 */
                            /*]]>*/
                        </script>
                        <div class="row">
                            <div class="col-md-12">
                                <div class="panel panel-default form-inline text-center">
                                    <div class="panel panel-body" style="height:800px;">
                                        <iframe src="../ht/building-layout" scrolling="no" frameborder="0" id="building-layout" style="position: relative; height: 100%; width: 100%; border:1px solid #ddd;">
                                        </iframe>
                                    </div>
                                </div>
                            </div>

                            <div class="modal fade" id="myModal2" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true" style="display: none; z-index: 1060;">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" id="modalNew" data-id="" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="myModalLabel" th:text="#{addauthlist}">운영자 인가 추가 등록</h4>
                                        </div>
                                        <div class="modal-body">
                                            <form accept-charset="UTF-8" id="createForm">
                                                <input type="hidden" id="mainpage_id" name="mainpage_id" value=""></input>
                                                <div class="form-group">
                                                    <label for="user-id" th:text="#{username}">계정명</label>
                                                    <select id="systemuser_id" name="systemuser_id" class="form-control"></select>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-primary-custom" id="createBtn2" th:text="#{add}">등록</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="modal fade" id="myModal" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true" style="display: none; z-index: 1060;">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" id="modalDelete" data-user-id="" data-id="" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="myModalLabel" th:text="#{delete}">삭제</h4>
                                        </div>
                                        <div class="modal-body">
                                            <span th:text="#{delmsg}">삭제하시겠습니까?</span>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-primary-custom" id="deleteBtn" th:text="#{delete}">삭제</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="modal fade" id="authlist" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true" style="display: none; z-index: 1050;">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" id="modalDelete" data-user-id="" data-id="" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                            </button>

                                        </div>
                                        <div class="modal-body">
                                            <div class="panel" style="border:1px solid #ddd;">
                                                <div class="panel panel-title">
                                                    <span class="godo" th:text="#{authlist}">인가된 운용자 리스트</span>

                                                </div>
                                                <div class="panel panel-body" id="building-layout">

                                                    <table class="table text-center" id="authList">
                                                        <thead>
                                                            <tr>
                                                                <th th:text="#{mainpage}+#{id}">mainpage_id</th>
                                                                <th th:text="#{systemuser_id}">systemuser_id</th>
                                                                <th th:text="#{username}">username</th>
                                                                <th th:text="#{fullname}">fullname</th>
                                                                <th th:text="#{email}">email</th>
                                                                <th th:text="#{joindate}">date_joined</th>
                                                                <th></th>
                                                            </tr>
                                                        </thead>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            </div>
            <!-- /.content -->
        </div>
        <!-- /.content-wrapper -->
    </div>
    <!-- ./wrapper -->

</body>

</html>
