        var openWindow = function() {
            if ($("#infoForm #site_id").val() == '' || $("#infoForm #node_id").val() == '') {
                if ($("#infoForm #ip").val() == '') {
                    alert("User currently Off-Line");
                } else {
                    alert("You are not authorized to view this site");
                }

            } else {
                var url = "/ht/viewing-site-tree.html?siteid=" + $("#infoForm #site_id").val() + "&nodeid=" + $("#infoForm #node_id").val();
                window.open(url);
            }
        }
        var openCMSWindow = function(site_id, node_id) {
            {
                var url = "/ht/viewing-site-tree.html?siteid=" + site_id + "&nodeid=" + node_id;
                window.open(url);
            }
        }
        var getConnectionDiagram = function(mac_address) {
            $.ajax({
                url: '/api/htbackend/getConnectionDiagramIPAM?mac_address=' + mac_address,
                dataType: 'text',
                contentType: 'application/x-www-form-urlencoded',
                method: 'get',
                success: function success(r) {
                    $("#connectionDiagram").empty();
                    $("#connectionDiagram").append("<tr>");
                    var fixedResponse = r.replace(/\\'/g, "'");
                    var jsonArray = JSON.parse(fixedResponse);
                    if (jsonArray.length == 0) {
                        // $("#connectionDiagram").append("<tr>");
                        $("#connectionDiagram").append("<th> No Available Data </th>");
                        $("#connectionDiagram").append("</tr>");
                        return;
                    }
                    //var url = "/ht/viewing-site-tree.html?siteid=" + $("#infoForm #site_id").val() + "&nodeid=" + $("#infoForm #node_id").val();
                    //http://localhost:8080/ht/viewing-site-tree.html?siteid=38&nodeid=225
                    //window.open(url);
                    for (var i = 0; i < jsonArray.length; i++) {
                        if (jsonArray[i].portname != '0') {
                            $("#connectionDiagram").append('<th class="th-img" style="border:1px solid #ccc; width:150px !important; height:150px; background-color:#f4fdff;">' + jsonArray[i].devicename + ' / ' + jsonArray[i].portname + '</br></br><img src="' + jsonArray[i].deviceimage + '"  onclick="openCMSWindow(' + jsonArray[i].site_id + ',' + jsonArray[i].node_id + ');" style="cursor:pointer;" /></th>');

                        } else {
                            $("#connectionDiagram").append('<th class="th-img" style="border:1px solid #ccc; width:150px !important; height:150px; background-color:#f4fdff;">' + jsonArray[i].devicename + '</br></br><img src="' + jsonArray[i].deviceimage + '"   onclick="openCMSWindow(' + jsonArray[i - 1].site_id + ',' + jsonArray[i - 1].node_id + ');"  style="cursor:pointer;" /></th>');

                        }
                        if (jsonArray[i].connectorimage != undefined) {
                            $("#connectionDiagram").append('<th class="th-img" style="width:50px;padding:0px;"><img src="' + jsonArray[i].connectorimage + '"  /></th>');
                        } else {
                            $("#connectionDiagram").append('<th class="th-img"></th>');
                        }
                    }
                    $("#connectionDiagram").append("</tr>");
                    $("#connectionDiagram").append("<tr>");
                    /*
	                for(var i=0;i<jsonArray.length;i++){
						
		                $("#connectionDiagram").append('<td class="td-name">'+ jsonArray[i].devicename+'</td>');
		                if(jsonArray[i].portname != '0'){
		                	$("#connectionDiagram").append('<td class="td-num">'+ jsonArray[i].portname+'</td>');
		                }else{
		                	$("#connectionDiagram").append('<td class="td-num"> </td>');
		                }
		                
		                if(jsonArray[i].connectorname != undefined){
		                	$("#connectionDiagram").append('<td class="td-name">'+ jsonArray[i].connectorname+'</td>');	
		                }else{
		                	$("#connectionDiagram").append('<td></td>');	
		                }
		                                    
	                }              
					*/
                    $("#connectionDiagram").append("</tr>");

                }
            });
        };
        var getConnectionDiagram2 = function(nodeid, portname) {
            $.ajax({

                    $("#connectionDiagram").empty();

                    if (jsonArray.length == 0) {

                        $("#connectionDiagram").append("<th> No Available Data </th>");
                        $("#connectionDiagram").append("</tr>");
                        return;
                    }

                    for (var i = 0; i < jsonArray.length; i++) {
                        if (jsonArray[i].portname != '0') {
                            $("#connectionDiagram").append('<th class="th-img" style="border:1px solid #ccc; width:150px !important; height:150px; background-color:#f4fdff;">' + jsonArray[i].devicename + ' / ' + jsonArray[i].portname + '</br></br><img src="' + jsonArray[i].deviceimage + '"  onclick="openCMSWindow(' + jsonArray[i].site_id + ',' + jsonArray[i].node_id + ');" style="cursor:pointer;" /></th>');

                        } else {
                            $("#connectionDiagram").append('<th class="th-img" style="border:1px solid #ccc; width:150px !important; height:150px; background-color:#f4fdff;">' + jsonArray[i].devicename + '</br></br><img src="' + jsonArray[i].deviceimage + '"  onclick="openCMSWindow(' + jsonArray[i - 1].site_id + ',' + jsonArray[i - 1].node_id + ');"  style="cursor:pointer;" /></th>');

                        if (jsonArray[i].connectorimage != undefined) {

                    $("#connectionDiagram").append("<tr>");
                    $("#connectionDiagram").append("</tr>");

                }

        $(document).ready(function() {
            $.fn.dataTableExt.sErrMode = 'none';

            $('document').ready(function() {
                $('#searchBtn').click(function() {
                    searchIPTerminal();
                });
                $('#keyword').keypress(function(e) {
                    if (e.which == 13) { //Enter key pressed
                        $('#searchBtn').click(); //Trigger search button click event
                    }
                });

            });
            //getEnduserList();
            function searchIPTerminal() {

                example_datatables = null;
                if (example_datatables) example_datatables.destroy();
                var url = "/htbackend/searchIPTerminal";
                if ($("#keyword").val() !== '') {
                    url += "?keyword=" + $("#keyword").val();
                }
                example_datatables = $('#test-table').DataTable({
                    "lengthMenu": [
                        [5, 25, 50, -1],
                        [5, 25, 50, "All"]
                    ],
                    sAjaxDataProp: "",
                    paging: true,
                    ordering: false,
                    info: false,
                    destroy: true,
                    searching: false,
                    ajax: {
                        url: url,
                        type: 'get'
                    },
                    dom: 'Bfrtip',
                    buttons: [{
                        extend: 'excel',
                        text: 'Excel',
                        className: 'exportExcel',
                        filename: 'IP terminal list',
                        exportOptions: {
                            modifier: {
                                page: 'all'
                            }
                        }
                    }, {
                        extend: 'csv',
                        text: 'CSV',
                        filename: 'IP terminal list',
                        className: 'exportExcel',
                        exportOptions: {
                            modifier: {
                                search: 'none',
                                page: 'all'
                            }
                        }
                    }],
                    columnDefs: [{
                        visible: false,
                        targets: [0, 1]
                    }],
                    columns: [{
                        "data": "node_id"
                    }, {
                        "data": "site_id"
                    }, {
                        "data": "asset_tag"
                    }, {
                        "data": "comments"
                    }, {
                        "data": "mac_address"
                    }, {
                        "data": "ip"
                    }, {
                        "data": "name"
                    }]
                });
                $(".dt-buttons").addClass('pull-right');
            };

            $('#test-table tbody').on('click', 'tr', function() {
                if ($(this).hasClass('selected')) {
                    $(this).removeClass('selected');
                } else {

                    example_datatables.$('tr.selected').removeClass('selected');
                    $(this).addClass('selected');

                    var d = example_datatables.row(this).data();
                    $("#infoForm #asset_tag").val(d.asset_tag);
                    $("#infoForm #comments").val(d.comments);
                    $("#infoForm #mac_address").val(d.mac_address);
                    $("#infoForm #ip").val(d.ip);
                    $("#infoForm #name").val(d.name);
                    //$("#infoForm #img-asset_tag").val( d.name );			                
                    $("#infoForm #node_id").val(d.node_id);
                    $("#infoForm #site_id").val(d.site_id);
                    if (d.name === 'Unauthorized') {
                        getConnectionDiagram2(d.node_id, d.portname);
                    } else {
                        getConnectionDiagram(d.mac_address);
                    }
                    getUsageHistory(d.name);
                }
            });
        });
