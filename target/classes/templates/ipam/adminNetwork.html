                <script type="text/javascript">
                    /*<![CDATA[*/
                    $(document).on("click", "#deleteBtn", function() {

                                setTimeout("location.reload();", 100);
                            }
                        });


                    });


                    $(document).on("click", "#modifyBtn", function() {
                        var modifydata = $("#updateForm").serializeArray();
                        var switches = serializeL2L3(sw1, sw2);
                        var data = {};
                        $.each(modifydata,
                            function(i, v) {
                                data[v.name] = v.value;
                            });
                        console.log(JSON.stringify(data));
                        data['switches'] = switches;
                        $.ajax({
                            url: '/api/htbackend/updateNetwork/' + $("#updateForm #id").val(),
                            dataType: 'text',
                            contentType: 'application/json',
                            data: JSON.stringify(data),
                            method: 'post',
                            success: function success(r) {

                                setTimeout("location.reload();", 100);
                            }
                        });
                    });


                    $(document).on("click", "#scanNowBtn", function() {
                        $.ajax({
                            url: '/api/htbackend/scanNetwork/' + $("#updateForm #id").val(),
                            method: 'get',
                            success: function success(r) {
                                alert("Scan Requested:");
                                //setTimeout("location.reload();", 100);
                            }
                        });
                    });
                    //업데이트 버튼 클릭시 제이슨화//	      



                    $(document).on("click", "#createBtn", function() {
                        var createdata = $("#createForm").serializeArray();
                        var switches = serializeL2L3(sw3, sw4);
                        var data = {};
                        $.each(createForm,
                            function(i, v) {
                                data[v.name] = v.value;
                            });
                        console.log(JSON.stringify(data));
                        data['switches'] = switches;
                        $.ajax({
                            url: '/api/htbackend/registerNetwork',
                            dataType: 'text',
                            contentType: 'application/json',
                            data: JSON.stringify(data),
                            method: 'post',
                            success: function success(r) {

                                $("#addForm").modal("hide");
                                setTimeout("location.reload();", 100);
                            }
                        });
                    });


                    function serialize(tokenfield) {
                        var items = tokenfield.getItems();
                        console.log(items);
                        var prop;
                        var data = {};
                        items.forEach(function(item) {
                            if (item.isNew) {
                                prop = tokenfield._options.newItemName;
                            } else {
                                prop = tokenfield._options.itemName;
                            }
                            if (typeof data[prop] === 'undefined') {
                                data[prop] = [];
                            }
                            if (item.isNew) {
                                data[prop].push(item.name);
                            } else {
                                data[prop].push(item[tokenfield._options.itemValue]);
                            }
                        });
                        return data;
                    };


                    function serializeL2L3(sw2, sw3) {
                        var sw2items = sw2.getItems();
                        console.log(sw2items);
                        var sw3items = sw3.getItems();
                        console.log(sw3items);
                        var data = [];
                        sw2items.forEach(function(item) {

                            var sw = {};
                            sw['opm_name'] = item['id'];
                            sw['ip'] = item['ip'];
                            sw['type_id'] = item['type_id'];
                            data.push(sw);

                        });
                        sw3items.forEach(function(item) {

                            var sw = {};
                            sw['opm_name'] = item['id'];
                            sw['ip'] = item['ip'];
                            sw['type_id'] = item['type_id'];
                            data.push(sw);

                        });
                        return data;
                    };

                    function getNetworkList() {

                        example_datatables = null;
                        if (example_datatables) example_datatables.destroy();

                        example_datatables = $('#networklist-table').DataTable({
                            sAjaxDataProp: "",
                            paging: false,
                            ordering: false,
                            info: false,
                            destroy: true,
                            searching: false,
                            columnDefs: [{
                                visible: false,
                                targets: [0, 2, 6]
                            }],
                            ajax: {
                                url: "/api/htbackend/getNetwork",
                                type: 'get'
                            },
                            columns: [{
                                "data": "id"
                            }, {
                                "data": "name"
                            }, {
                                "data": "network"
                            }, {
                                "data": "subnet"
                            }, {
                                "data": "start_ipaddress",
                                "defaultContent": ""
                            }, {
                                "data": "end_ipaddress",
                                "defaultContent": ""
                            }, {
                                "data": "description",
                                "defaultContent": ""
                            }]
                        });
                    };

                    $(document).ready(function() {
                        getNetworkList();
                        sw1 = new Tokenfield({
                            el: document.querySelector('#schswitch'),
                            remote: {
                                url: "/api/htbackend/getL2Switch"

                            },
                            newItems: false
                        });
                        sw1.on('change', function() {
                            var out = JSON.stringify(serialize(sw1), null, 2);
                            console.log(out);
                        });
                        sw2 = new Tokenfield({
                            el: document.querySelector('#gate3switch'),
                            remote: {
                                url: "/api/htbackend/getL3Gateway"

                            },
                            newItems: false
                        });
                        sw2.on('change', function() {
                            var out = JSON.stringify(serialize(sw2), null, 2);
                            console.log(out);
                        });
                        sw3 = new Tokenfield({
                            el: document.querySelector('#l2SwitchC'),
                            remote: {
                                url: "/api/htbackend/getL2Switch"

                            },
                            newItems: false
                        });
                        sw3.on('change', function() {
                            var out = JSON.stringify(serialize(sw3), null, 2);
                            console.log(out);
                        });
                        sw4 = new Tokenfield({
                            el: document.querySelector('#gateWayl3C'),
                            remote: {
                                url: "/api/htbackend/getL3Gateway"

                            },
                            newItems: false
                        });
                        sw4.on('change', function() {
                            var out = JSON.stringify(serialize(sw4), null, 2);
                            console.log(out);
                        });

                        $('#networklist-table tbody').on('click', 'tr', function() {
                            if ($(this).hasClass('selected')) {
                                $(this).removeClass('selected');
                            } else {

                                example_datatables.$('tr.selected').removeClass('selected');
                                $(this).addClass('selected');

                                var d = example_datatables.row(this).data();
                                $("#updateForm #id").val(d.id);
                                $("#deleteForm #id").val(d.id);
                                $("#updateForm #name").val(d.name);
                                $("#updateForm #network").val(d.network);
                                $("#updateForm #subnet").val(d.subnet);

                                $("#updateForm #start_ipaddress").val(d.start_ipaddress);

                                $("#updateForm #end_ipaddress").val(d.end_ipaddress);
                                $("#updateForm #description").val(d.description);
                                sw1.emptyItems();
                                sw2.emptyItems();
                                sw1.addItems(d.l2switches);
                                sw2.addItems(d.l3switches);
                                $('#networklist-table tbody').css('vertical-align', 'middle');
                            }
                        });

                    });

                    /*]]>*/
