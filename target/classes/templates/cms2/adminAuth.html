    <!-- Ionicons -->

    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/jvectormap/jquery-jvectormap.css" th:href="@{/modules/jvectormap/jquery-jvectormap.css}" />

    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>
    <!-- AdminLTE App -->
    <script src="../../static/js/adminlte.min.js" th:src="@{/js/adminlte.min.js}"></script>
    <!-- AdminLTE for demo purposes -->
    <script src="../../static/js/demo.js" th:src="@{/js/demo.js}"></script>
    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
    <!-- SlimScroll -->
    <script src="../../static/modules/jquery-slimscroll/jquery.slimscroll.min.js" th:src="@{/modules/jquery-slimscroll/jquery.slimscroll.min.js}"></script>
    <!-- ChartJS -->
    <script src="../../static/modules/Chart.js/Chart.js" th:src="@{/modules/Chart.js/Chart.js}"></script>
    <!-- AdminLTE dashboard demo (This is only for demo purposes) -->
    <script src="../../static/js/pages/dashboard2.js" th:src="@{/js/pages/dashboard2.js}"></script>
    <!-- DataTables -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/datatables.net-bs/css/dataTables.bootstrap.min.css" th:href="@{/modules/datatables.net-bs/css/dataTables.bootstrap.min.css}" />
    <script src="../../static/modules/datatables.net/js/jquery.dataTables.min.js" th:src="@{/modules/datatables.net/js/jquery.dataTables.min.js}"></script>
    <script src="../../static/modules/datatables.net-bs/js/dataTables.bootstrap.min.js" th:src="@{/modules/datatables.net-bs/js/dataTables.bootstrap.min.js}"></script>
    <!-- Tokenfield -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/tokenfield/tokenfield.css" th:href="@{/modules/tokenfield/tokenfield.css}" />
    <script src="../../static/modules/tokenfield/tokenfield.min.js" th:src="@{/modules/tokenfield/tokenfield.min.js}"></script>

    <script type="text/javascript">
        /*<![CDATA[*/
        $(document).on("click", "#deleteBtn", function() {
            $.ajax({
                url: '/api/htbackend/removeAuthorizedSystemUser?cms_site_id=' + $("#modalDelete").attr("data-id") + '&systemuser_id=' + $("#modalDelete").attr("data-user-id"),
                dataType: 'text',
                contentType: 'application/x-www-form-urlencoded',
                method: 'get',
                success: function success(r) {
                    $("#myModal").modal("hide");
                    getAuthList($("#modalDelete").attr("data-id"));
                }
            });
        });

        $(document).on("click", "#MainNavHelp", function() {
            var siteid = $("#modalNew").attr("data-id");
            $("#createForm #cms_site_id").val(siteid);
            $.ajax({
                url: '/api/htbackend/getAvailableSystemUser?siteid=' + siteid,
                dataType: 'text',
                method: 'get',
                success: function success(r) {
                    console.log(r);
                    var rspns = eval(r);
                    //fill country
                    $("#systemuser_id option").remove(); // Remove all <option> child tags.
                    $("#systemuser_id").append( // Append an object to the inside of the select box
                        $("<option></option>") // Yes you can do this.
                        .text('--- Select ---')
                        .val('NONE')
                    );
                    $.each(rspns, function(index, item) { // Iterates through a collection
                        $("#systemuser_id").append( // Append an object to the inside of the select box
                            $("<option></option>") // Yes you can do this.
                            .text(item.username)
                            .val(item.systemuser_id)
                        );
                    });
                }
            }); //ajax//

        });

        $(document).on("click", "#createBtn", function() {
            var url = "/api/htbackend/addAuthorizedSystemUser?";
            if ($("#createForm #cms_site_id").val() !== '') {
                url += "&cms_site_id=" + $("#createForm #cms_site_id").val();
            }
            if ($("#createForm #systemuser_id").val() !== 'NONE') {
                url += "&systemuser_id=" + $("#createForm #systemuser_id").val();
            }

            $.ajax({
                url: url,
                dataType: 'text',
                contentType: 'application/x-www-form-urlencoded',
                method: 'get',
                success: function success(r) {

                    $("#myModal2").modal("hide");
                    getAuthList($("#modalNew").attr("data-id"));
                }
            });
        });

        function getCmsSiteList() {

            example_datatables = null;
            if (example_datatables) example_datatables.destroy();

            example_datatables = $('#cmsSiteList').DataTable({
                "lengthMenu": [
                    [5, 25, 50, -1],
                    [5, 25, 50, "All"]
                ],
                sAjaxDataProp: "",
                paging: true,
                ordering: false,
                info: false,
                destroy: true,
                searching: false,
                columnDefs: [{
                    visible: false,
                    targets: [0, 3, 5, 6]
                }],
                ajax: {
                    url: "/htbackend/getCMSSite",
                    type: 'get'
                },
                columns: [{
                    "data": "id"
                }, {
                    "data": "name"
                }, {
                    "data": "description"
                }, {
                    "data": "region_id"
                }, {
                    "data": "region_name",
                    "defaultContent": ""
                }, {
                    "data": "image_site",
                    "defaultContent": ""
                }, {
                    "data": "sitetreejson_data",
                    "defaultContent": ""
                }]
            });
            $("#cmsSiteList_paginate").closest("div").unwrap();
            $("#cmsSiteList_paginate").closest("div").addClass('col-sm-12');
            $("#cmsSiteList_paginate").siblings("div").remove();
            $("#cmsSiteList_paginate").css("text-align", "center");
            $("#cmsSiteList_length").hide();
        };

        function getAuthList(siteid) {

            authList_datatables = null;
            if (authList_datatables) authList_datatables.destroy();

            authList_datatables = $('#authList').DataTable({
                sAjaxDataProp: "",
                paging: false,
                ordering: false,
                info: false,
                destroy: true,
                searching: false,
                columnDefs: [{
                    visible: false,
                    targets: [0]
                }],
                ajax: {
                    url: "/api/htbackend/getAuthList?siteid=" + siteid,
                    type: 'get'
                },
                columns: [{
                    "data": "cms_site_id"
                }, {
                    "data": "systemuser_id"
                }, {
                    "data": "username"
                }, {
                    "data": "fullname"
                }, {
                    "data": "email"
                }, {
                    "data": "date_joined",
                    "defaultContent": ""
                }, {
                    data: null,
                    className: "center",
                    defaultContent: '<a class="btn btn-danger-custom" data-target="#myModal" data-toggle="modal" id="deleteCaller" href="#myModal"><i class="glyphicon glyphicon-remove"></i>&nbsp;&nbsp;삭제</a>'
                        //defaultContent: '<a href="" class="editor_edit">Edit</a> / <a href="" class="editor_remove">Delete</a>'
                }]
            });

            $('#authList tbody').on('click', 'tr', function() {
                if ($(this).hasClass('selected')) {
                    $(this).removeClass('selected');
                } else {

                    authList_datatables.$('tr.selected').removeClass('selected');
                    $(this).addClass('selected');

                    var d = authList_datatables.row(this).data();

                    $("#modalDelete").attr("data-user-id", d.systemuser_id);
                    $("#modalDelete").attr("data-id", d.cms_site_id);
                }
            });
        };
        $(document).ready(function() {
            getCmsSiteList();

            $('#cmsSiteList tbody').on('click', 'tr', function() {
                if ($(this).hasClass('selected')) {
                    $(this).removeClass('selected');
                } else {

                    example_datatables.$('tr.selected').removeClass('selected');
                    $(this).addClass('selected');

                    var d = example_datatables.row(this).data();
                    $("#modalNew").attr("data-id", d.id);
                    getAuthList(d.id);

                }
            });

        });

        /*]]>*/
    </script>
    <style>
        .table-hover>tbody>tr {
            cursor: pointer;
        }
	    .table>thead>tr>th {
            padding: 8px 0;
            line-height: 30px;
        }
        .table>tbody>tr>td {
            padding: 8px;
            line-height: 31px;
            vertical-align: middle !important;
        }
    </style>
</head>

<body>

    <div class="page-wrapper" layout:fragment="content">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <div class="panel-custom-wrap">
                <!-- Content Header (Page header) -->
                <section class="content-header">
                    <div class="subpage-menu-border">
                        <h3 th:text="#{cmsauth}" class="title col-sm-6"></h3>
                        <ol class="breadcrumb no-margin-padding col-sm-6  text-right">
                            <li><a href="/cms2/index" th:href="@{/cms2/index.html}"><i class="fa fa-dashboard" th:text="' '+#{cmsopt}"></i></a>
                            </li>
                            <li>
                                <a href="../cms2/setting" th:href="@{../cms2/setting.html}" th:text="#{adminpage}"></a>
                            </li>
                            <li class="active" th:text="#{cmsauth}"></li>
                        </ol>
                    </div>
                </section>
                <!-- Main content -->
                <section class="content">
                    <div class="subpage-menu row">
                        <div class="col-md-4">
                            <div class="panel panel-wrap" style="height: 400px;">
                                <div class="panel-title">
                                    <span class="godo" th:text="#{cmsauth}+#{list}">list</span>
                                </div>
                                <div class="panel-body">
                                    <table id="cmsSiteList" class="display table table-fixed text-center table-hover" cellspacing="0" width="100%">
                                        <thead class="table-head panel panel-title thead-auth">
                                            <tr id="tableth">
                                                <th th:text="#{id}">ID</th>
                                                <th th:text="#{name}">name</th>
                                                <th th:text="#{description}">description</th>
                                                <th th:text="#{region}+' '+#{id}">region_id</th>
                                                <th th:text="#{region}">region_name</th>
                                                <th th:text="#{img}+' '+#{site}">image_site</th>
                                                <th th:text="#{sitetreejsondata}">sitetreejson_data</th>
                                            </tr>
                                        </thead>
                                    </table>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-8">
                            <div class="panel panel-wrap">
                                <div class="panel-title">
                                    <span class="godo" th:text="#{authlist}">인가된 운용자 리스트</span>
                                    <div class="pull-right">
                                        <a data-target="#myModal2" data-toggle="modal" id="MainNavHelp" href="#myModal2" class="btn btn-primary-custom">
                                            <i class="fa fa-plus" th:text="' '+#{add}"></i>
                                        </a>
                                    </div>
                                </div>
                                <div class="panel-body">
                                    <table class="table text-center" id="authList">
                                        <thead class="thead-auth">
                                            <tr id="tableth">
                                                <th th:text="#{site}+' '+#{id}">cms_site_id</th>
                                                <th th:text="#{systemuser_id}">systemuser_id</th>
                                                <th th:text="#{username}">username</th>
                                                <th th:text="#{fullname}">fullname</th>
                                                <th th:text="#{email}">email</th>
                                                <th th:text="#{joindate}">date_joined</th>
                                                <th th:text="#{opt}"></th>
                                            </tr>
                                        </thead>

                                    </table>
                                </div>
                            </div>
                        </div>

                        <div class="modal fade" id="myModal2" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <button type="button" class="close" id="modalNew" data-id="" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                        </button>
                                        <h4 class="modal-title" id="myModalLabel" th:text="#{addauthlist}">운영자 인가 추가 등록</h4>
                                    </div>
                                    <div class="modal-body">
                                        <form accept-charset="UTF-8" id="createForm">
                                            <input type="hidden" id="cms_site_id" name="cms_site_id" value=""></input>
                                            <div class="form-group">
                                                <label for="user-id" th:text="#{name}">계정명</label>
                                                <select id="systemuser_id" name="systemuser_id" class="form-control">
                                                </select>
                                            </div>
                                        </form>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-primary-custom" id="createBtn" th:text="#{addid}">등록</button>
                                        <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <button type="button" class="close" id="modalDelete" data-user-id="" data-id="" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                        </button>
                                        <h4 class="modal-title" id="myModalLabel" th:text="#{delete}">삭제</h4>
                                    </div>
                                    <div class="modal-body">
                                        <span th:text="#{delmsg}">삭제하시겠습니까?</span>
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-primary-custom" id="deleteBtn" th:text="#{delete}">삭제</button>
                                        <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </section>
                <!-- /.content -->
            </div>
        </div>
        <!-- /.content-wrapper -->
    </div>
    <!-- ./wrapper -->
</body>

</html>
