<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="layout/default6">

<head>
    <title>simpleEye MainPage</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Bootstrap 3.3.7 -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/bootstrap/dist/css/bootstrap.min.css" th:href="@{/modules/bootstrap/dist/css/bootstrap.min.css}" />
    <!-- Font Awesome -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/font-awesome/css/font-awesome.min.css" th:href="@{/modules/font-awesome/css/font-awesome.min.css}" />
    <!-- Ionicons -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/Ionicons/css/ionicons.min.css" th:href="@{/modules/Ionicons/css/ionicons.min.css}" />
    <!-- jvectormap -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/jvectormap/jquery-jvectormap.css" th:href="@{/modules/jvectormap/jquery-jvectormap.css}" />
    <!-- theme custom -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/system-white.css" th:href="@{/css/system-white.css}" />
    <!-- AdminLTE Skins. Choose a skin from the css/skins
       folder instead of downloading all of them to reduce the load. -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/skins/_all-skins.min.css" th:href="@{/css/skins/_all-skins.min.css}" />

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->
    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>
    <!-- AdminLTE App -->
    <script src="../../static/js/adminlte.min.js" th:src="@{/js/adminlte.min.js}"></script>
    <!-- AdminLTE for demo purposes -->
    <script src="../../static/js/demo.js" th:src="@{/js/demo.js}"></script>
    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
    <!-- SlimScroll -->
    <script src="../../static/modules/jquery-slimscroll/jquery.slimscroll.min.js" th:src="@{/modules/jquery-slimscroll/jquery.slimscroll.min.js}"></script>
    <!-- ChartJS -->
    <script src="../../static/modules/Chart.js/Chart.js" th:src="@{/modules/Chart.js/Chart.js}"></script>
    <!-- AdminLTE dashboard demo (This is only for demo purposes) -->
    <script src="../../static/js/pages/dashboard2.js" th:src="@{/js/pages/dashboard2.js}"></script>
    <script type="text/javascript" th:inline="javascript">
        /*<![CDATA[*/
        $(document).ready(function() {
            /*
          $.ajax({
				url: '/api/htbackend/getManufacturer',
				dataType: 'text',
				method: 'get',
				success: function success(r) { var rspns = eval(r);  }
		}); //ajax//*/
        });


        $(document).on("click", "#createBtn", function() {
            var createManufacturer = $("#createManufacturer").serialize();
            console.log(createManufacturer);
            $.ajax({
                url: '/api/htbackend/addManufacturer',
                dataType: 'text',
                contentType: 'application/x-www-form-urlencoded',
                data: createManufacturer,
                method: 'post',
                success: function success(r) {
                    $("#createModal").modal("hide");
                    setTimeout("location.reload();", 100);
                }
            });
        }); /* 생성버튼 클릭시 ajax 방식으로 데이터 인서트 */

        $(document).on("click", "#deleteBtn", function() {
            var id = $(this).attr('manufact-id');
            console.log(id);
            $(".modal-body #delete-id").val(id);
            //도시삭제 버튼 클릭시 삭제모달 실행//
            $(document).on("click", "#deleteManufact", function() {
                var y = document.getElementById("deleteManufacturerModal");
                var deleteManufacturerModal = $("#deleteManufacturerModal").serialize();
                //var parent_id = if $(country).val();
                $.ajax({
                    url: '/api/htbackend/deleteManufacturer/' + $(".modal-body #delete-id").val(),
                    dataType: 'text',
                    contentType: 'application/x-www-form-urlencoded',
                    data: deleteManufacturerModal,
                    method: 'get',
                    success: function success(r) {
                        $("#deleteModal").modal("hide");
                        setTimeout("location.reload();", 100);
                    }
                });
            });
        }); /* 생성버튼 클릭시 ajax 방식으로 도시 데이터 딜리트 */

        $(document).on("click", "#modifyBtn", function() {
            var id = $(this).attr('manufact-id');
            var manufacturer = $(this).attr('manufact-name');
            console.log(id);
            console.log(manufacturer);
            $(".modal-body #modify-id").val(id);
            $(".modal-body #manufacturer").val(manufacturer);
            //변경 버튼 클릭시 변경모달 실행//
            $(document).on("click", "#modifyButton", function() {
                var modifydata = $("#modifyManufacturer").serialize();
                console.log(modifydata);
                //var parent_id = if $(country).val();
                $.ajax({
                    url: '/api/htbackend/updateManufacturer',
                    dataType: 'text',
                    contentType: 'application/x-www-form-urlencoded',
                    data: modifydata,
                    method: 'post',
                    success: function success(r) {
                        console.log(r)
                        $("#modifyModal").modal("hide");
                        setTimeout("location.reload();", 100);
                    }
                });
            });
        }); /* 변경버튼 클릭시 ajax 방식으로 데이터변경 */
        /*]]>*/
    </script>
    <style>
        .table>thead>tr>th {
            padding: 10px 0;
            line-height: 32px;
        }   
    </style>    
</head>

<body>

    <div class="page-wrapper" layout:fragment="content">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <div class="panel-custom-wrap">
                <!-- Content Header (Page header) -->
                <section class="content-header">
                    <div class="subpage-menu-border">
                        <h3 th:text="#{manufactureropt}" class="title col-sm-6"></h3>
                        <ol class="breadcrumb no-margin-padding col-sm-6  text-right">
                            <li><a href="/cms2/index" th:href="@{/cms2/index.html}"><i class="fa fa-dashboard" th:text="' '+#{cmsopt}"></i></a>
                            </li>
                            <li>
                                <a href="../cms2/setting" th:href="@{../cms2/setting.html}" th:text="#{adminpage}"></a>
                            </li>
                            <li class="active" th:text="#{manufactureropt}"></li>
                        </ol>
                    </div>
                </section>
                <!-- Main content -->
                <section class="content">
                    <div class="subpage-menu">
                        <div class="panel panel-wrap">
                            <div class="panel-body">
                                <div class="panel-title">
                                    <span class="godo" th:text="#{manufacturer}+#{list}">list</span>
                                    <div class="pull-right">
                                        <div class="btn-group" role="group" aria-label="...">
                                            <a type="button" class="btn btn-primary-custom" data-toggle="modal" id="addBtn" href="#createModal"><i class="glyphicon glyphicon-plus" th:text="' '+#{manufacturer}+#{add}"></i></a>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="panel-body">
                                <div class="col-md-12">
                                    <table class="table text-center">
                                        <thead class="thead">
                                            <tr>
                                                <th th:text="#{no}">No</th>
                                                <th th:text="#{manufacturer}"></th>
                                                <th th:modify="#{modify}" style="width:600px;">수정</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="Hashmap : ${Hashmap}" id="tabletr">
                                                <td th:text="${Hashmap['id']}" id="id" class="td-country"></td>
                                                <td th:text="${Hashmap['name']}" id="name" class="td-country"></td>
                                                <td>
                                                    <div class="btn-group">
                                                        <a class="btn btn-warning-custom" data-toggle="modal" id="modifyBtn" href="#modifyModal" th:attr="manufact-id=${Hashmap['id']}, manufact-name=${Hashmap['name']}" th:text="#{modify}"></a>
                                                        <a class="btn btn-danger-custom" data-toggle="modal" id="deleteBtn" href="#deleteModal" th:attr="manufact-id=${Hashmap['id']}" th:text="#{delete}"></a>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>

                                    <!-- 제조자생성 -->
                                    <div class="modal fade" id="createModal" tabindex="-1" role="dialog" aria-labelledby="addManufacturerLabel" aria-hidden="true">
                                        <div class="modal-dialog" role="document">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                                    </button>
                                                    <h4 class="modal-title" id="addManufacturerLabel" th:text="#{manufacturer}"></h4>
                                                </div>
                                                <div class="modal-body text-center">
                                                    <form class="form-horizontal" accept-charset="UTF-8" role="form" method="post" id="createManufacturer">
                                                        <div class="form-group">
                                                            <label class="col-md-2" for="name" th:text="#{name}"></label>
                                                            <div class="col-md-10">
                                                                <input type="text" id="create-name" name="name" class="form-control" />
                                                            </div>
                                                        </div>
                                                    </form>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-primary-custom" id="createBtn" th:text="#{create}">create</button>
                                                    <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}"></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 지역변경모달 -->
                                    <div class="modal fade" id="modifyModal" tabindex="-1" role="dialog" aria-labelledby="modifyLabel" aria-hidden="true">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                                    </button>
                                                    <h4 class="modal-title" id="modifyLabel" th:text="#{manufacturer}"></h4>
                                                </div>
                                                <div class="modal-body row">
                                                    <form class="form-horizontal col-sm-12" accept-charset="UTF-8" id="modifyManufacturer" role="form" method="post">
                                                        <div class="form-group col-md-12">
                                                            <label class="col-sm-2" for="manufacturer" th:text="#{name}"></label>
                                                            <div class="col-sm-10">
                                                                <input type="hidden" id="modify-id" name="id" />
                                                                <input type="text" id="manufacturer" name="name" class="form-control" />
                                                            </div>
                                                        </div>
                                                    </form>
                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-primary-custom" id="modifyButton" th:text="#{modify}"></button>
                                                    <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}"></button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 도시삭제 모달 -->
                                    <div class="modal fade" id="deleteModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                                        <div class="modal-dialog">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                                    </button>
                                                    <h4 class="modal-title" id="myModalLabel" th:text="#{delete}">삭제</h4>
                                                </div>
                                                <form accept-charset="UTF-8" role="form" method="get" id="deleteForm">
                                                    <div class="modal-body">
                                                        <input type="hidden" name="id" id="delete-id" />
                                                        <span th:text="#{delmsg}">삭제하시겠습니까?</span>
                                                    </div>
                                                </form>
                                                <div class="modal-footer">
                                                    <button type="submit" class="btn btn-primary-custom" id="deleteManufact" th:text="#{delete}">삭제</button>
                                                    <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>
                </section>
                <!-- /.content -->
            </div>
        </div>
        <!-- /.content-wrapper -->
    </div>
    <!-- ./wrapper -->
</body>

</html>
