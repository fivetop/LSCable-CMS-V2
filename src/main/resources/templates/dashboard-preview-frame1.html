        /*<![CDATA[*/

        var widgets = [[${widgets}]];

    <script type="text/javascript">
        /*<![CDATA[*/

        $(document).ready(function() {

            function reloadEmbedded(iframeid) {
                document.getElementById(iframeid).src += '';
            }

            function refresh(iframeid) {
                $('#' + iframeid).contents().find('.icon-ccw').click();
            }
            setInterval(
                function() {
                    for (var i in iframes) {
                        refresh(iframes[i]);
                    }
                }, widget_polling_interval);

            var iframes = [];

            var layout = mainpage["layout_name"].split("X");
            var layoutcol = layout[0];
            var layoutrow = layout[1];
            var currentRow = -1;
            var currentCol = 0;
            //var rowIndex;
            var tbRowIndex;
            var rowMaxIndex = -1;
            var endIndex = -1;
            var trCnt = 0;

            $('.content').css('padding', '0px');
            $('#myTable').css('margin', '0px');
            var table = document.getElementById('myTable');
            table.deleteRow(0);
            for (var x in widgets) {
                //{widget_id: 127, widgettype, title: "Rack IP", colindex: 0, rowindex: 0}, colspan, rowspan, content_data, option_data
                var colindex = widgets[x].colindex;
                var rowindex = widgets[x].rowindex;
                var colspan = widgets[x].colspan;
                var rowspan = widgets[x].rowspan;
                var content_data = widgets[x].content_data;
                var option_data = (widgets[x].option_data);
                var iframeid = colindex + '_' + rowindex;
                var option_data_name;
                var option_data_option;
                if (option_data) {
                    option_data_name = JSON.parse(option_data).name;
                    option_data_option = JSON.parse(option_data).option;
                }

                var widget_id = widgets[x].widget_id;
                var widgettype = widgets[x].widgettype;

                var widget_title = encodeURIComponent(widgets[x].title);

                if ((currentRow == -1) || (currentRow < rowindex)){ //&& endIndex < rowindex + rowspan)) {
                    if (trCnt > 0) {
                        for (var i = 1; i < trCnt; i++)
                            table.insertRow(-1);
                        trCnt = 0;
                    }
                    //rowIndex = table.insertRow(rowindex);
                    tbRowIndex = table.insertRow(-1);
                    //if(rowspan>1 && currentRow != -1)
                    //	table.insertRow(-1);
                    rowMaxIndex = rowMaxIndex + rowspan;
                    currentRow = rowindex;
                    currentCol = 0;
                    trCnt = rowspan;
                } else {
                	trCnt = rowspan;
                }

                //var cellIndex = tbRowIndex.insertCell(currentCol++);
                var cellIndex = tbRowIndex.insertCell(-1);
                if (widgettype === 'Map') {
                    cellIndex.innerHTML = '<div class="box box-gray"><div id="map-widget">' + '<iframe ' + ' id="' + iframeid + '"' + ' src="/ht/preview-map-widget?widget_id=' + widget_id + '" scrolling="no" frameborder="0" style="position: relative; height: 100%; width: 100%;"></iframe></div></div>';
                } else if (widgettype === 'OPM Embedded') {
                    iframes.push(iframeid);
                    cellIndex.innerHTML = '<div class="box box-gray"><div class="box-control">' + '<iframe ' + ' id="' + iframeid + '"' + ' src="http://' + location.hostname + content_data + '"'
                        //+'<iframe src="' + content_data +'"'	 	
                        + 'scrolling="no" frameborder="0" style="position: relative; height: 100%; width: 100%; border:1px solid #ddd;"> </iframe>' + '</div></div>';
                } else {
                    cellIndex.innerHTML = '<div class="box box-gray"><div class="box-control">' + '<iframe ' + ' id="' + iframeid + '"' + ' src="/frame2/' + content_data + '?title=' + widget_title + '&option_data_name=' + option_data_name + '&option_data_option=' + option_data_option + '&widget_layout_rowspan=' + rowspan +'" scrolling="no" frameborder="0" style="position: relative; height: 100%; width: 100%;"></iframe></div></div>';
                }
                $(cellIndex).addClass('cell1X1');
                cellIndex.colSpan = colspan;
                cellIndex.rowSpan = rowspan;
                /*if(widgettype === 'Map'){
						cellIndex.rowSpan= rowspan;
					}else{
						cellIndex.rowSpan= 1;
					}*/
                //cellIndex.style.height = (214*rowspan) + 'px'; 
                cellIndex.style.height = (216 * rowspan) + 'px';
                if (colindex == 0) {
                    cellIndex.style.width = (312 * colspan) + 'px';
                } else {
                    cellIndex.style.width = (colspan / layoutcol) * 100 + '%';
                }

                if ((colindex + colspan) == layoutcol) {
                	
                	if(widgets[x*1+1] && ( widgets[x*1+1].rowindex >= rowindex+rowspan)){
                        for (var i = 1; i < trCnt; i++)
                            table.insertRow(-1);

                        endIndex = rowindex + rowspan;
                	}
                }
                
                trCnt = 0;
                

            }
        });
        /*]]>*/
    </script>
