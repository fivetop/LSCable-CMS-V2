    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>

    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>

    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>

    <script src="../../static/js/chartist.min.js" th:src="@{/js/chartist.min.js}"></script>
    <!--<script src="../../static/js/chartist-custom.js" th:src="@{/js/chartist-custom.js}"></script>
<script src="../../static/js/chartist-custom5.js" th:src="@{/js/chartist-custom5.js}"></script>-->
    <script src="../../static/js/chartist-custom3.js" th:src="@{/js/chartist-custom3.js}"></script>
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/chartist.min2.css" th:href="@{/css/chartist.min2.css}" />
    <style>
        .box-body {
            height: 150px;
        }
        body {
            background-color: transparent;
        }
        @media (max-width: 1800px) {
            .chart-legend>li {
                margin: 0;
            }
        }
    </style>
</head>

<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="box-header">

        <h3 class="box-title" th:text="#{alarms}"></h3>
    </div>
    <!-- /.box-header -->

    <div class="box-body box-body-custom2">
        <div class="row">
            <div class="chart">
                <div class="ct-chart ct-golden-section" id="chart"></div>
            </div>
            <!-- ./chart-responsive -->

            <ul class="chart-legend clearfix text-center" style="width:100px;">
                <li><i class="fa fa-circle-o critical"></i> Critical</li>
                <li><i class="fa fa-circle-o major"></i> Major</li>
                <li><i class="fa fa-circle-o minor"></i> Minor</li>
                <li><i class="fa fa-circle-o warning"></i> Warning</li>
            </ul>
        </div>
    </div>

</body>

</html>
