<head>

    <!-- theme custom -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/frame-black.css" th:href="@{/css/frame-black.css}" />

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->

    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>

    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>

    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>


    <script src="../../static/js/chartist.min.js" th:src="@{/js/chartist.min.js}"></script>
    <script src="../../static/js/chartist-plugin-legend.js" th:src="@{/js/chartist-plugin-legend.js}"></script>
    <script src="../../static/js/chartist-plugin-axistitle.min.js" th:src="@{/js/chartist-plugin-axistitle.min.js}"></script>

    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/chartist.min3.css" th:href="@{/css/chartist.min3.css}" />
    <style>
		.ct-axis-title {
			fill:#acacac !important;
		}      
        body {
            background-color: transparent;
        }
        @media (min-height: 220px) {
            .box-body-custom {
                padding-top: 32px;
            }
        }
        ;
    </style>
    <script type="text/javascript" th:inline="javascript">
        /*<![CDATA[*/
        var widget_title = [[${widget_title}]];
        var option_data_name = [[${option_data_name}]];
        var option_data_option = [[${option_data_option}]];
        var widget_polling_interval = [[${widget_polling_interval}]];
        var NodataMSG = [[#{NodataMSG}]];
        /*]]>*/
    </script>
    <script type="text/javascript">
        /*<![CDATA[*/

        $(document).ready(function() {
            function clearChart() {
                if (chart)
                    chart.detach();
                $("#ct-dotchart").empty();
                series = [];
            }
            getWidgetDataAPI(option_data_name, option_data_option, callbackAPIInit);
            setInterval(function() {
                clearChart();
                getWidgetDataAPI(option_data_name, option_data_option, callbackAPIInit);
            }, widget_polling_interval);

            function getWidgetDataAPI(arg, option, callbackfnc) {
                $.ajax({
                    url: '/api/getWidgetDataAPI/' + arg + '?device_name=' + option,
                    dataType: 'text',
                    method: 'get',
                    success: function(data) {
                        callbackfnc(JSON.parse(data));
                    }
                });
            }

            var series = [];
            var chart;
            function getReadableFileSizeString(fileSizeInBytes) {
                var i = -1;
                var byteUnits = [' K', ' M', ' G', ' T', 'P', 'E', 'Z', 'Y'];
                do {
                    fileSizeInBytes = fileSizeInBytes / 1024;
                    i++;
                } while (fileSizeInBytes > 1024);

                return Math.max(fileSizeInBytes, 0.1).toFixed(1) + byteUnits[i];
            }
            function callbackAPIInit(data) {
                var list = data.traffic;

                var map = new Object(); // or var map = {};
                var legends = [];
                for (var x in list) {
                    if (map[list[x].dispname] == undefined) {
                        map[list[x].dispname] = [];
                        series.push(map[list[x].dispname]);
                        legends.push(list[x].dispname);
                    }
                    map[list[x].dispname].push(list[x].g);
                }
                if (legends.length == 0) {
                    $(".ct-golden-section").css('display', 'none');
                    $(".box-body").empty();
                    $(".box-body").append('<div class="text-center" id="nodata"><p style="margin:50px 0;">' + NodataMSG + '</p></div>')
                } else {
                    $("#nodata").remove();
                    $(".box-body").css('padding-top', '30px');
                    $(".ct-golden-section").css('display', 'block');
                    var seriesCount = list.length / legends.length;
            		//var label = Array.apply(null, Array(seriesCount)).map(function (x, i) { return i+1 });
            		chart = new Chartist.Line('.ct-dotchart', {
            		  //labels: label,
            		  labels: [],
                        series: series
                            /*times(seriesCount).map(random),
		    times(seriesCount).map(random),
		    times(seriesCount).map(random),
		    times(seriesCount).map(random)*/

                    }, {
                        chartPadding: {
                            top: 0,
                            right: 0,
                            bottom: 0,
                            left: 0
                          },
                        showLine: false,
                        fullWidth: true,
                        axisY: {
                            labelInterpolationFnc: function(value) {
                                //return (value / 1000 / 1000) + 'M';
                                return getReadableFileSizeString(value);
                            }
                        },
					    plugins: [
							        /*Chartist.plugins.legend({
							            legendNames: legends,
							            position: 'top'
							        }),*/
		                            Chartist.plugins.ctAxisTitle({
		                                axisX: {
		                                  axisTitle: "Last 24 Hrs",
		                                  axisClass: "ct-axis-title",
		                                  offset: {
		                                    x: 0,
		                                    y: 15
		                                  },
		                                  textAnchor: "middle"
		                                }/*,
		                                axisY: {
		                                  axisTitle: "Traffic",
		                                  axisClass: "ct-axis-title",
		                                  offset: {
		                                    x: 0,
		                                    y: -1
		                                  },
		                                  flipTitle: false
		                                }*/
		                              })					        
							    ]                        
                    });

                    if (chart.supportsAnimations) {
                        var seq = 0;

                        chart.on('created', function() {
                            seq = 0;
                        });

                        chart.on('draw', function(data) {
                            if (data.type === 'point') {
                                seq++;

                                data.element.animate({
                                    x1: {
                                        from: data.x - 50,
                                        to: data.x,
                                        begin: seq * 50,
                                        dur: 800,
                                        easing: Chartist.Svg.Easing.easeOutQuint
                                    },
                                    opacity: {
                                        from: 0,
                                        to: 1,
                                        begin: seq * 50,
                                        dur: 300,
                                    }
                                });
                            }
                        });
                    } else {
                        //chart.options.showLabel = false;
                        //chart.update();

                    }
                }
            };
        });
        /*]]>*/
    </script>
</head>

<body oncontextmenu="return false" ondragstart="return false" onselectstart="return false">
    <div class="box-header">

        <h3 class="box-title" th:text="${widget_title}"></h3>
    </div>
    <!-- /.box-header -->
    <div class="box-body box-body-custom">
        <div class="ct-golden-section">
            <div class="ct-dotchart"></div>
        </div>
    </div>
</body>

</html>
