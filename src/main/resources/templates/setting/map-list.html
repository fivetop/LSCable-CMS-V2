<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="layout/default4">

<head>
    <title>simpleEye MapWidgets Management</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Bootstrap 3.3.7 -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/bootstrap/dist/css/bootstrap.min.css" th:href="@{/modules/bootstrap/dist/css/bootstrap.min.css}" />
    <!-- Font Awesome -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/font-awesome/css/font-awesome.min.css" th:href="@{/modules/font-awesome/css/font-awesome.min.css}" />
    <!-- Ionicons -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/Ionicons/css/ionicons.min.css" th:href="@{/modules/Ionicons/css/ionicons.min.css}" />
    <!-- jvectormap -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/jvectormap/jquery-jvectormap.css" th:href="@{/modules/jvectormap/jquery-jvectormap.css}" />
    <!-- theme custom -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/system-black.css" th:href="@{/css/system-black.css}" />
    <!-- AdminLTE Skins. Choose a skin from the css/skins
       folder instead of downloading all of them to reduce the load. -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/skins/_all-skins.min.css" th:href="@{/css/skins/_all-skins.min.css}" />

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->


    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>
    <!-- AdminLTE App -->
    <script src="../../static/js/adminlte.min.js" th:src="@{/js/adminlte.min.js}"></script>
    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
    <!-- SlimScroll -->
    <script src="../../static/modules/jquery-slimscroll/jquery.slimscroll.min.js" th:src="@{/modules/jquery-slimscroll/jquery.slimscroll.min.js}"></script>
    <!-- ChartJS -->
    <script src="../../static/modules/Chart.js/Chart.js" th:src="@{/modules/Chart.js/Chart.js}"></script>
    <!-- AdminLTE dashboard demo (This is only for demo purposes) -->
    <script src="../../static/js/pages/dashboard2.js" th:src="@{/js/pages/dashboard2.js}"></script>
    <!-- DataTables -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/datatables.net-bs/css/dataTables.bootstrap.min.css" th:href="@{/modules/datatables.net-bs/css/dataTables.bootstrap.min.css}" />
    <script src="../../static/modules/datatables.net/js/jquery.dataTables.min.js" th:src="@{/modules/datatables.net/js/jquery.dataTables.min.js}"></script>
    <script src="../../static/modules/datatables.net-bs/js/dataTables.bootstrap.min.js" th:src="@{/modules/datatables.net-bs/js/dataTables.bootstrap.min.js}"></script>
    <style>
        .table>thead>tr>th {
            padding: 10px 0;
            line-height: 32px;
        }
        .panel {
            box-shadow: none;
        }
        button:disabled,
        button[disabled] {
            border: 1px solid #999;
            background-color: #ccc;
            color: #666;
        }
        .blocked { background: #686363 !important; border: 1px solid #686363; color: #fff !important; opacity: .65; border: 1px solid #686363 !important;}
        .blocked:hover, .blocked:active, .blocked:focus {background: #2b2929 !important;}
    </style>
</head>

<body>

    <div class="page-wrapper" layout:fragment="content">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <div class="panel-custom-wrap">
                <!-- Content Header (Page header) -->
                <section class="content-header">
                    <div class="icon-menu-borderline">
                        <h3 th:text="#{maplist}" class="title col-sm-6"></h3>
                        <ol class="breadcrumb no-margin-padding col-sm-6  text-right">
                            <li><a href="../mainpage" th:href="@{../mainpage.html}"><i class="fa fa-dashboard"></i> simpleEye</a>
                            </li>
                            <li><a href="/setting/system" th:href="@{/setting/system.html}" th:text="#{systemopt}">system</a>
                            </li>
                            <li class="active" th:text="#{maplist}">main-setting2</li>
                        </ol>
                    </div>
                </section>

                <!-- Main content -->
                <section class="content">
                    <div class="subpage-menu">
                        <div class="panel panel-wrap">
                            <div class="panel-heading">
                                <div class="panel-title">
                                    <span class="godo" th:text="#{maplist}"></span>
                                    <div class="main-btn pull-right">
                                        <a sec:authorize="hasAuthority('Administrators')" th:href="@{/ht/map-widget.html?widgetType=23}" class="btn btn-primary-custom"><i class="fa fa-plus" th:text="' '+#{newMap}"></i></a>
                                    </div>
                                </div>
                            </div>
                            <div class="panel panel-body">
                                <div class="table-responsive col-md-12">
                                    <table class="table table-striped text-center">
                                        <thead class="thead-search">
                                            <tr id="tableth">
                                                <th th:text="#{id}" style=" width:80px; border-top-left-radius: 10px">ID</th>
                                                <th th:text="#{parentid}" style="width:200px;">부모 ID</th>
                                                <th th:text="#{name}" style="width:300px;">이름</th>
                                                <th style="width:300px; border-top-right-radius:10px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="mapwidget : ${MapWidgetList}" id="tabletr">
                                                <td th:text="${mapwidget['mapwidget_id']}" id="mapwidget_id"></td>
                                                <td th:text="${mapwidget['mapwidget_parent_id']}" id="mapwidget_parent_id"></td>
                                                <td th:text="${mapwidget['displayname']}" id="displayname"></td>
                                                <td>
                                                    <div class="btn-group" role="toolbar" aria-label="Toolbar with button groups" sec:authorize="isAuthenticated()">
                                                        <a class="btn btn-success-custom" th:text="#{modify}" th:attr="data-id=${mapwidget['mapwidget_id']}, href=@{'/ht/map-widget.html?id='+${mapwidget['mapwidget_id']} +'&amp;widgetType='+${mapwidget['widgettype_id']}}" id="modify">수정</a>
                                                        <button th:classappend="${mapwidget['mapwidget_parent_id']} == null ? '':'blocked'" type="button" class="btn btn-danger-custom" data-toggle="modal" data-target="#deleteMapWidget" href="#deleteMapWidget" id="delete" th:text="#{delete}" th:attr="data-id=${mapwidget['mapwidget_id']}">삭제</button>
                                                        <a class="btn btn-info-custom" th:text="#{view}" th:attr="data-id=${mapwidget['mapwidget_id']}, href=@{'/ht/preview-map-widget.html?widget_id='+${mapwidget['mapwidget_id']}}" id="view">조회</a>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <script type="text/javascript">
                                /*<![CDATA[*/
                                $(document).on("click", "#delete", function() {
                                    var mapwidgetid = $(this).attr('data-id');
                                    $("#deleteMapWidget #mapwidgetid").val(mapwidgetid);
                                });
                                $(document).on("click", "#deleteBtn", function() {
                                    $.ajax({
                                        url: '/api/htbackend/deleteMapWidget/' + $("#deleteMapWidget #mapwidgetid").val(),
                                        dataType: 'text',
                                        contentType: 'application/x-www-form-urlencoded',
                                        method: 'get',
                                        success: function success(r) {
                                            //alert("Deleted:"+r);
                                            $("#deleteMapWidget").modal("hide");
                                            setTimeout("location.reload();", 100);
                                        }
                                    });
                                });
                                $(document).ready(function() {
                                    $(".blocked").prop("disabled", true).addClass('btn-blocked-custom').removeClass('btn-danger-custom');
                                });
                                /*]]>*/
                            </script>

                            <div class="modal fade" id="deleteMapWidget" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" id="modalDelete" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="myModalLabel" th:text="#{delete}">삭제</h4>
                                        </div>
                                        <div class="modal-body">
                                            <input type="hidden" id="mapwidgetid" value=""></input>
                                            <span th:text="#{delmsg}">삭제하시겠습니까?</span>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="button" class="btn btn-primary-custom" id="deleteBtn" th:text="#{delete}">삭제</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>

                <!-- /.content -->
            </div>
        </div>
        <!-- /.content-wrapper -->
    </div>
    <!-- ./wrapper -->

</body>

</html>
