<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" layout:decorator="layout/default4">

<head>
    <title>simpleEye MainPage</title>
    <!-- Tell the browser to be responsive to screen width -->
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Bootstrap 3.3.7 -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/bootstrap/dist/css/bootstrap.min.css" th:href="@{/modules/bootstrap/dist/css/bootstrap.min.css}" />
    <!-- Font Awesome -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/font-awesome/css/font-awesome.min.css" th:href="@{/modules/font-awesome/css/font-awesome.min.css}" />
    <!-- Ionicons -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/Ionicons/css/ionicons.min.css" th:href="@{/modules/Ionicons/css/ionicons.min.css}" />
    <!-- jvectormap -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/modules/jvectormap/jquery-jvectormap.css" th:href="@{/modules/jvectormap/jquery-jvectormap.css}" />
    <!-- theme custom -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/system-black.css" th:href="@{/css/system-black.css}" />
    <!-- AdminLTE Skins. Choose a skin from the css/skins
       folder instead of downloading all of them to reduce the load. -->
    <link rel="stylesheet" type="text/css" media="screen" href="../../static/css/skins/_all-skins.min.css" th:href="@{/css/skins/_all-skins.min.css}" />

    <!-- HTML5 Shim and Respond.js IE8 support of HTML5 elements and media queries -->
    <!-- WARNING: Respond.js doesn't work if you view the page via file:// -->
    <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.3/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->
    <!-- jQuery 3 -->
    <script src="../../static/modules/jquery/dist/jquery.min.js" th:src="@{/modules/jquery/dist/jquery.min.js}"></script>
    <!-- Bootstrap 3.3.7 -->
    <script src="../../static/modules/bootstrap/dist/js/bootstrap.min.js" th:src="@{/modules/bootstrap/dist/js/bootstrap.min.js}"></script>
    <!-- FastClick -->
    <script src="../../static/modules/fastclick/lib/fastclick.js" th:src="@{/modules/fastclick/lib/fastclick.js}"></script>
    <!-- AdminLTE App -->
    <script src="../../static/js/adminlte.min.js" th:src="@{/js/adminlte.min.js}"></script>
    <!-- Sparkline -->
    <script src="../../static/modules/jquery-sparkline/dist/jquery.sparkline.min.js" th:src="@{/modules/jquery-sparkline/dist/jquery.sparkline.min.js}"></script>
    <!-- jvectormap  -->
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-1.2.2.min.js}"></script>
    <script src="../../static/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js" th:src="@{/modules/plugins/jvectormap/jquery-jvectormap-world-mill-en.js}"></script>
    <!-- SlimScroll -->
    <script src="../../static/modules/jquery-slimscroll/jquery.slimscroll.min.js" th:src="@{/modules/jquery-slimscroll/jquery.slimscroll.min.js}"></script>
    <!-- ChartJS -->
    <script src="../../static/modules/Chart.js/Chart.js" th:src="@{/modules/Chart.js/Chart.js}"></script>
    <!-- AdminLTE dashboard demo (This is only for demo purposes) -->
    <script src="../../static/js/pages/dashboard2.js" th:src="@{/js/pages/dashboard2.js}"></script>
    <style>
        .table>thead>tr>th {
            padding: 10px 0;
            line-height: 32px;
        }
        .panel {
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div class="page-wrapper" layout:fragment="content">

        <!-- Content Wrapper. Contains page content -->
        <div class="content-wrapper">
            <div class="panel-custom-wrap">
                <!-- Content Header (Page header) -->
                <section class="content-header">
                    <div class="icon-menu-borderline">
                        <h3 th:text="#{adminpage}" class="title col-sm-6"></h3>
                        <ol class="breadcrumb no-margin-padding col-sm-6  text-right">
                            <li><a href="/mainpage" th:href="@{/mainpage.html}"><i
									class="fa fa-dashboard"></i> simpleEye</a>
                            </li>
                            <li><a href="/setting/system" th:href="@{/setting/system.html}" th:text="#{systemopt}">system</a>
                            </li>
                            <li class="active" th:text="#{adminpage}">Admin</li>
                        </ol>
                    </div>
                </section>
                <!-- Main content -->
                <section class="content">
                    <div class="subpage-menu">
                        <div class="panel panel-wrap">
                            <div class="panel-heading">
                                <div class="panel-title">
                                    <span class="godo" th:text="#{admin}+#{list}"></span>
                                    <div class="main-btn pull-right">
                                        <a data-target="#create" data-toggle="modal" id="createButton" th:if="${#authentication.name}=='admin'" href="#create" class="btn btn-primary-custom"> <i class="fa fa-plus" th:text="' '+#{addid}"></i>
                                        </a>
                                    </div>
                                </div>
                            </div>
                            <div class="panel panel-body">
                                <div class="table-responsive col-md-12">
                                    <table class="table text-center" id="usertable">
                                        <thead class="thead-search">
                                            <tr id="tableth">
                                                <th th:text="#{systemuser_id}" style="display: none;">시스템사용자id</th>
                                                <th style="width: 220px; border-top-left-radius: 10px" th:text="#{username}">사용자명</th>
                                                <th style="width: 130px;" th:text="#{fullname}">이름</th>
                                                <th style="width: 180px;" th:text="#{group_name}">권한</th>
                                                <th style="width: 150px;" th:text="#{email}">이메일</th>
                                                <th style="width: 200px;" th:text="#{date_joined}">가입일</th>
                                                <th style="width: 280px; border-top-right-radius: 10px;"></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="Hashmap : ${Hashmap}" id="tabletr">
                                                <td id="systemuser_id" th:text="${Hashmap['systemuser_id']}" style="display: none;">1</td>
                                                <td th:text="${Hashmap['username']}">사용자명</td>
                                                <td th:text="${Hashmap['fullname']}">이름</td>
                                                <td th:text="${Hashmap['group_name']}">명</td>
                                                <td th:text="${Hashmap['email']}">이메일</td>
                                                <!-- 만약 이메일이 null일때, else 이메일이 값이 있을때 data-password=${Hashmap['password']} -->
                                                <td th:text="${Hashmap['date_joined']}">가입일</td>
                                                <td>
                                                    <div class="btn-group" role="toolbar" aria-label="Toolbar with button groups">
                                                        <a type="button" id="pwModify" th:if="${#authentication.name}=='admin' or ${#authentication.name} == ${Hashmap['username']}" class="btn btn-warning-custom" th:text="#{pwmodify}" th:attr="data-id=${Hashmap['systemuser_id']},data-group_id=${Hashmap['group_id']},
						    data-group_name=${Hashmap['group_name']},data-fullname=${Hashmap['fullname']},
						    data-username=${Hashmap['username']},data-email=${Hashmap['email']},data-join=${Hashmap['date_joined']},data-level=${Hashmap['is_superuser']}" data-toggle="modal" data-target="#pwmodify">비밀번호수정</a> <a type="button" id="modifyButton" th:if="${#authentication.name}=='admin' or ${#authentication.name} == ${Hashmap['username']}" class="btn btn-success-custom" th:text="#{modify}" th:attr="data-id=${Hashmap['systemuser_id']},data-group_id=${Hashmap['group_id']},
						    data-group_name=${Hashmap['group_name']},data-fullname=${Hashmap['fullname']},
						    data-username=${Hashmap['username']},data-email=${Hashmap['email']},data-join=${Hashmap['date_joined']},data-level=${Hashmap['is_superuser']}" data-toggle="modal" data-target="#modify">수정</a>
                                                        <button type="button" id="deleteButton" th:classappend="${#authentication.name}=='admin' and ${Hashmap['username']}!='admin' ? '':'blocked'" class="btn btn-danger-custom" th:text="#{delete}" th:attr="data-id=${Hashmap['systemuser_id']},data-group_id=${Hashmap['group_id']},
						    data-group_name=${Hashmap['group_name']},data-fullname=${Hashmap['fullname']},
						    data-username=${Hashmap['username']},data-email=${Hashmap['email']},data-join=${Hashmap['date_joined']},data-level=${Hashmap['is_superuser']}" data-toggle="modal" data-target="#myModal">삭제</button>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <script type="text/javascript" th:inline="javascript">
                                /*<![CDATA[*/
                                var able = [[#{able}]];
                                var disable = [[#{disable}]];
                                $(document).ready(function() {

                                    $.ajax({
                                        url: '/api/htbackend/getSystemGroup',
                                        dataType: 'text',
                                        method: 'get',
                                        success: function success(r) {
                                            //console.log(r);//
                                            var rspns = eval(r);
                                            //fill country
                                            $("#c_group_id option").remove(); // Remove all <option> child tags.
                                            $("#c_group_id").append( // Append an object to the inside of the select box
                                                $("<option></option>") // Yes you can do this.
                                                .text('--- Select ---')
                                                .val('NONE')
                                            );
                                            $.each(rspns, function(index, item) { // Iterates through a collection          	   
                                                $("#c_group_id").append( // Append an object to the inside of the select box
                                                    $("<option></option>") // Yes you can do this.
                                                    .text(item.name)
                                                    .val(item.id)
                                                );
                                            });
                                        }
                                    });

                                    $.ajax({
                                        url: '/api/htbackend/getTimeZone',
                                        dataType: 'text',
                                        method: 'get',
                                        success: function success(r) {
                                            //console.log(r);//
                                            var rspns = JSON.parse(r);
                                            //fill country
                                            $("#c_timezone option").remove(); // Remove all <option> child tags.
                                            $("#c_timezone_id").append( // Append an object to the inside of the select box
                                                $("<option></option>") // Yes you can do this.
                                                .text('--- Select ---')
                                                .val('NONE')
                                            );
                                            $.each(rspns.tzList, function(index, item) { // Iterates through a collection    
                                                if (item === rspns.tZone) {
                                                    $("#c_timezone_id").append( // Append an object to the inside of the select box

                                                        $('<option selected="selected"></option>') // Yes you can do this.
                                                        .text(item)
                                                        .val(item)
                                                    );
                                                    $(".modal-body #c_timezone_name").val(item);

                                                } else {
                                                    $("#c_timezone_id").append( // Append an object to the inside of the select box
                                                        $("<option></option>") // Yes you can do this.
                                                        .text(item)
                                                        .val(item)
                                                    );
                                                }

                                            });
                                        }
                                    });
                                    $(".blocked").prop("disabled", true).addClass('btn-blocked-custom').removeClass('btn-danger-custom');

                                }); //셀렉트 클릭시 해당하는 텍스트값 히든인풋에 표시//	             

                                $(document).on("click", "#modifyButton", function() {
                                    var username = $(this).attr('data-id');
                                    var groupid = $(this).attr('data-group_id');
                                    $(".modal-body #systemuser_id").val($(this).attr('data-id'));
                                    $(".modal-body #group_id").val($(this).attr('data-group_id'));
                                    $(".modal-body #fullname").val($(this).attr('data-fullname'));
                                    $(".modal-body #username").val($(this).attr('data-username'));
                                    $(".modal-body #email").val($(this).attr('data-email'));
                                    $(".modal-body #dateJoined").val($(this).attr('data-join'));
                                    $(".modal-body #is_superuser").val($(this).attr('data-level'));

                                    $('.inlineRadio').each(function(e) {

                                        if ($(this).val() == groupid) {
                                            $(this).attr("checked", "checked");
                                        }

                                    });

                                }); //변경버튼 클릭시 모달 바디에 데이터 뿌려주기

                                $(document).on("click", "#pwModify", function() {
                                    var username = $(this).attr('data-id');
                                    var groupid = $(this).attr('data-group_id');
                                    $(".modal-body #systemuser_id").val($(this).attr('data-id'));
                                    $(".modal-body #group_id").val($(this).attr('data-group_id'));
                                    $(".modal-body #fullname").val($(this).attr('data-fullname'));
                                    $(".modal-body #username").val($(this).attr('data-username'));
                                    //console.log(username);//
                                }); //비밀번호변경버튼 클릭시 모달 바디에 데이터 뿌려주기		



                                $(document).on("click", "#deleteButton", function() {
                                    var username = $(this).attr('data-id');
                                    var groupid = $(this).attr('data-group_id');
                                    $(".modal-body #systemuser_id").val($(this).attr('data-id'));
                                }); //삭제버튼 클릭시 모달바디에 데이터 뿌려주기

                                $(document).on("click", "#deleteBtn", function() {

                                    var deleteresult = $("#deleteForm").serialize();
                                    console.log(deleteresult);
                                    $('#systemuser_id').val(systemuser_id);
                                    $.ajax({
                                        url: '/api/htbackend/deleteSystemUser/' + $(".modal-body #systemuser_id").val(),
                                        dataType: 'text',
                                        contentType: 'application/x-www-form-urlencoded',
                                        data: deleteresult,
                                        method: 'get',
                                        success: function success(r) {
                                            $("#myModal").modal("hide");
                                            setTimeout("location.reload();", 100);
                                        }
                                    });


                                }); /* 변경버튼 클릭시 ajax 방식으로 데이터 삭제 */

                                $(document).on("click", "#pwmodifyBtn", function() {
                                    var formresult = $("#pwmodifyForm").serialize();
                                    if ($("#pwmodifyForm #newPassword").val() !== $("#pwmodifyForm #confirmPassword").val()) {
                                        alert("New Passowrd and Confirm Password are not the same")
                                    } else {
                                        console.log(formresult);
                                        $.ajax({
                                            url: '/api/htbackend/changeSystemUserPassword',
                                            data: formresult,
                                            dataType: 'text',
                                            method: 'post',
                                            success: function success(r) {
                                                if (JSON.parse(r).error) {
                                                    alert(JSON.parse(r).error.message);
                                                }
                                                $("#pwmodify").modal("hide");
                                            }
                                        });
                                        $('#pwmodifyBtn').modal('hide');
                                    }

                                }); /* 변경버튼 클릭시 ajax방식으로 비밀번호 업데이트*/

                                $(document).on("click", "#modifyBtn", function() {

                                    var formresult = $("#modifyForm").serialize();
                                    console.log(formresult);
                                    $('#systemuser_id').val(systemuser_id);
                                    $.ajax({
                                        url: '/api/htbackend/updateSystemUser/' + $(".modal-body #systemuser_id").val(),
                                        dataType: 'text',
                                        contentType: 'application/x-www-form-urlencoded',
                                        data: formresult,
                                        method: 'post',
                                        success: function success(r) {
                                            $("#modify").modal("hide");
                                            setTimeout("location.reload();", 100);
                                        }

                                    });

                                }); /* 변경버튼 클릭시 ajax 방식으로 데이터 업데이트 */

                                $(document).on("click", "#c_check_id", function() {

                                    $.ajax({
                                        url: '/api/htbackend/checkDuplicateSystemUserId/' + $(".modal-body #c_username").val(),
                                        dataType: 'text',
                                        contentType: 'application/x-www-form-urlencoded',
                                        method: 'get',
                                        success: function(status) {

                                            var rspns = eval(status);
                                            if (rspns[0]['Status'] == false) {
                                                alert(able),
                                                    $('#c_username').css("background-color", "#e5ffeb")
                                                $('#createBtn').attr("disabled", false);
                                            } else {
                                                alert(disable),
                                                    $('#c_username').css("background-color", "#ffd1d1")
                                                $('#createBtn').attr("disabled", true);
                                            };;
                                        }
                                    });
                                }); //아이디 중복체크

                                $(document).on("click", "#createBtn", function() {
                                    var x = document.getElementById("create");
                                    var createresult = $("#createForm").serialize();

                                    if ($("#createForm #c_password").val() !== $("#createForm #confirmPassword").val()) {
                                        alert("Passowrd and Confirm Password are not the same")
                                    } else {
                                        console.log(createresult);
                                        $.ajax({
                                            url: '/api/htbackend/registerSystemUser/',
                                            dataType: 'text',
                                            contentType: 'application/x-www-form-urlencoded',
                                            data: createresult,
                                            method: 'post',
                                            success: function success(r) {
                                                if (JSON.parse(r).error) {
                                                    alert(JSON.parse(r).error.message);
                                                }
                                                $("#create").modal("hide");
                                                setTimeout("location.reload();", 100);

                                            }
                                        });
                                    }
                                }); /* 생성버튼 클릭시 ajax 방식으로 데이터 인서트 */

                                $(document).on("change", "#c_group_id", function() {
                                    $(".modal-body #c_group_name").val($(this).find("option:selected").text());

                                });
                                $(document).on("change", "#c_timezone_id", function() {
                                    $(".modal-body #c_timezone_name").val($(this).find("option:selected").text());

                                });
                                $(document).on("change", "#c_username", function() {
                                    $(".modal-body #c_email").val($(this).val());

                                });
                                /*]]>*/
                            </script>

                            <!-- delete modal box -->
                            <div class="modal fade" id="myModal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="myModalLabel" th:text="#{delete}">삭제</h4>
                                        </div>
                                        <form accept-charset="UTF-8" role="form" method="get" id="deleteForm">
                                            <div class="modal-body">
                                                <input type="hidden" id="systemuser_id" /> <span th:text="#{delmsg}">삭제하시겠습니까?</span>
                                            </div>
                                        </form>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary-custom" id="deleteBtn" th:text="#{delete}">삭제</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- modify modal box -->
                            <div class="modal fade" id="modify" tabindex="-1" role="dialog" aria-labelledby="modifyLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="modifyLabel" th:text="#{modify}">사용자수정</h4>
                                        </div>
                                        <div class="modal-body">
                                            <form accept-charset="UTF-8" role="form" method="post" id="modifyForm">
                                                <div class="form-group form-horizontal">
                                                    <div class="form-group">
                                                        <input type="hidden" name="is_superuser" id="is_superuser" />
                                                        <input type="hidden" name="systemuser_id" id="systemuser_id" />
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="username" th:text="#{username}">아이디</label>
                                                        <div class="col-sm-10">
                                                            <input name="username" id="username" type="text" class="form-control" readonly="readonly" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="fullname" th:text="#{fullname}">이름</label>
                                                        <div class="col-sm-10">
                                                            <input name="fullname" id="fullname" type="text" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="email" th:text="#{email}">이메일</label>
                                                        <div class="col-sm-10">
                                                            <input name="email" id="email" type="text" class="form-control" readonly="readonly" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="group_id" th:text="#{level}">권한</label>
                                                        <div class="col-sm-10">
                                                            <select class="form-control" id="group_id" name="group_id">
                                                                <option value="NONE">--- Select ---</option>
                                                                <option value="1">Administrators</option>
                                                                <option value="2">Operators</option>
                                                            </select>
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="dateJoined" th:text="#{date_joined}">가입일</label>
                                                        <div class="col-sm-10">
                                                            <input name="date-joined" id="dateJoined" type="text" class="form-control" readonly="readonly" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary-custom" id="modifyBtn" th:text="#{modify}">등록</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- create modal box -->
                            <div class="modal fade" id="create" tabindex="-1" role="dialog" aria-labelledby="createLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="createLabel" th:text="#{addid}">신규
												사용자등록</h4>
                                        </div>
                                        <div class="modal-body">
                                            <form accept-charset="UTF-8" role="form" method="post" id="createForm">
                                                <div class="form-group form-horizontal">
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_username" th:text="#{username}">아이디</label>
                                                        <div class="col-sm-8">
                                                            <input name="username" id="c_username" type="email" class="form-control" placeholder="Email Address" />
                                                        </div>
                                                        <div class="col-sm-2" style="padding: 0px;">
                                                            <button type="button" id="c_check_id" class="btn btn-primary-custom" th:text="#{check}">중복확인</button>
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_password" th:text="#{password}">비밀번호</label>
                                                        <div class="col-sm-10">
                                                            <input name="password" id="c_password" type="password" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="confirmPassword" th:text="#{confirm-password}">비밀번호 확인</label>
                                                        <div class="col-sm-10">
                                                            <input name="confirmPassword" id="confirmPassword" type="password" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_fullname" th:text="#{fullname}">이름</label>
                                                        <div class="col-sm-10">
                                                            <input name="fullname" id="c_fullname" type="text" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_email" th:text="#{email}">이메일</label>
                                                        <div class="col-sm-10">
                                                            <input name="email" id="c_email" type="email" class="form-control" readonly="readonly" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_group_id" th:text="#{level}">권한</label>
                                                        <div class="col-sm-10">
                                                            <select class="form-control" id="c_group_id" name="group_id">
                                                                <!-- 스크립트 셀렉트 참조  -->
                                                            </select>
                                                            <input type="hidden" id="c_group_name" name="group_name" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="c_timezone_id" th:text="#{timezone}">시간대</label>
                                                        <div class="col-sm-10">
                                                            <select class="form-control" id="c_timezone_id" name="timezone_id">
                                                                <!-- 스크립트 셀렉트 참조  -->
                                                            </select>
                                                            <input type="hidden" id="c_timezone_name" name="timezone_name" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary-custom" id="createBtn" th:text="#{create}">등록</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- 비밀번호 변경 -->
                            <div class="modal fade" id="pwmodify" tabindex="-1" role="dialog" aria-labelledby="pwmodifyLabel" aria-hidden="true">
                                <div class="modal-dialog">
                                    <div class="modal-content">
                                        <div class="modal-header">
                                            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                <span aria-hidden="true">&times;</span>
                                            </button>
                                            <h4 class="modal-title" id="pwmodifyLabel" th:text="#{pwmodify}">비밀번호수정</h4>
                                        </div>
                                        <div class="modal-body">
                                            <form accept-charset="UTF-8" role="form" method="post" id="pwmodifyForm">
                                                <div class="form-group form-horizontal">
                                                    <div class="form-group">
                                                        <input type="hidden" name="systemuser_id" id="systemuser_id" />
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="username" th:text="#{username}">아이디</label>
                                                        <div class="col-sm-10">
                                                            <input name="username" id="username" type="text" class="form-control" readonly="readonly" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="oldPassword" th:text="#{password}">비밀번호</label>
                                                        <div class="col-sm-10">
                                                            <input name="oldPassword" id="oldPassword" type="password" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="newPassword" th:text="#{new-password}">새 비밀번호</label>
                                                        <div class="col-sm-10">
                                                            <input name="newPassword" id="newPassword" type="password" class="form-control" />
                                                        </div>
                                                    </div>
                                                    <div class="form-group">
                                                        <label class="col-sm-2" for="confirmPassword" th:text="#{confirm-password}">비밀번호 확인</label>
                                                        <div class="col-sm-10">
                                                            <input name="confirmPassword" id="confirmPassword" type="password" class="form-control" />
                                                        </div>
                                                    </div>
                                                </div>
                                            </form>
                                        </div>
                                        <div class="modal-footer">
                                            <button type="submit" class="btn btn-primary-custom" id="pwmodifyBtn" th:text="#{modify}">등록</button>
                                            <button type="button" class="btn btn-default" data-dismiss="modal" th:text="#{cancel}">취소</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
            <!-- /.content -->
        </div>
        <!-- /.content-wrapper -->
    </div>
    <!-- ./wrapper -->

</body>

</html>
